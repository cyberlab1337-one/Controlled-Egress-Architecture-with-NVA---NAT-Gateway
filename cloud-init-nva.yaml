#cloud-config

package_update: true

packages:
  - iptables-persistent

write_files:
  - path: /etc/sysctl.d/99-ipforward.conf
    permissions: '0644'
    content: |
      net.ipv4.ip_forward=1

runcmd:
  - sysctl --system
  - OUT_IF=$(ip -o -4 addr show | awk '/10\.0\.2\./ {print $2; exit}')
  - IN_IF=$(ip -o -4 addr show | awk '/10\.0\.1\./ {print $2; exit}')
  - ip route replace default via 10.0.2.1 dev $OUT_IF
  - iptables -A FORWARD -i $IN_IF -o $OUT_IF -j ACCEPT
  - iptables -A FORWARD -i $OUT_IF -o $IN_IF -m state --state ESTABLISHED,RELATED -j ACCEPT
  - iptables -t nat -A POSTROUTING -s 10.0.1.0/24 -o $OUT_IF -j MASQUERADE
  - netfilter-persistent save